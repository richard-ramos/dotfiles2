# ── Monitor ──────────────────────────────────────────────
monitor = , preferred, auto, 1

# ── Environment ─────────────────────────────────────────
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland
env = MOZ_ENABLE_WAYLAND, 1
env = QT_QPA_PLATFORM, wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = GDK_BACKEND, wayland,x11

# ── Autostart ───────────────────────────────────────────
exec-once = waybar
exec-once = dunst
exec-once = awww-daemon
exec-once = hypridle
exec-once = /usr/libexec/polkit-gnome-authentication-agent-1

# ── Input ───────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

# ── General ─────────────────────────────────────────────
general {
    gaps_in = 10
    gaps_out = 5
    border_size = 2
    col.active_border = rgb(89b4fa) rgb(cba6f7) 45deg
    col.inactive_border = rgb(313244)
    layout = dwindle
    allow_tearing = false
}

# ── Decoration ──────────────────────────────────────────
decoration {
    rounding = 8
    blur {
        enabled = true
        size = 5
        passes = 2
        new_optimizations = true
    }
    drop_shadow = true
    shadow_range = 8
    shadow_render_power = 2
    col.shadow = rgba(1a1a2eee)
}

# ── Animations ──────────────────────────────────────────
animations {
    enabled = true
    bezier = ease, 0.25, 0.1, 0.25, 1
    animation = windows, 1, 4, ease, slide
    animation = fade, 1, 4, ease
    animation = workspaces, 1, 4, ease, slide
}

# ── Layouts ─────────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
}

# ── Misc ────────────────────────────────────────────────
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
    vrr = 2
    no_direct_scanout = true
}

# ── Rendering ───────────────────────────────────────────
opengl {
    nvidia_anti_flicker = true
}

# ── Keybinds ────────────────────────────────────────────
$mod = SUPER
$terminal = alacritty
$browser = firefox
$fileManager = thunar
$menu = wofi --show drun
$runMenu = wofi --show run

# Apps - Regolith style, with a few existing Hyprland aliases kept
bind = $mod, Return, exec, $terminal
bind = $mod SHIFT, Return, exec, $browser
bind = $mod, Space, exec, $menu
bind = $mod SHIFT, Space, exec, $runMenu
bind = $mod SHIFT, slash, exec, sh -c 'hyprctl binds | wofi --dmenu --prompt Keybindings'
bind = $mod, E, exec, $fileManager
bind = $mod SHIFT, N, exec, nautilus --new-window

# Regolith settings shortcuts
bind = $mod, C, exec, regolith-control-center
bind = $mod, D, exec, regolith-control-center display
bind = $mod, W, exec, regolith-control-center wifi
bind = $mod, B, exec, regolith-control-center bluetooth

# Session management
bind = $mod, Q, killactive
bind = $mod SHIFT, Q, killactive
bind = $mod SHIFT, C, exec, hyprctl reload
bind = $mod CTRL, R, exec, hyprctl reload
bind = $mod SHIFT, E, exit
bind = $mod SHIFT, B, exec, systemctl reboot
bind = $mod SHIFT, P, exec, systemctl poweroff
bind = $mod, Escape, exec, hyprlock
bind = $mod SHIFT, S, exec, systemctl suspend

# Window management
bind = $mod, F, fullscreen, 0
bind = $mod SHIFT, F, togglefloating
bind = $mod, P, pseudo
bind = $mod, S, togglesplit
bind = $mod, V, togglesplit
bind = $mod, G, togglesplit
bind = $mod, BackSpace, togglesplit
bind = $mod, T, togglegroup
bind = $mod CTRL, M, movetoworkspacesilent, special
bind = $mod CTRL, A, togglespecialworkspace

# Focus (vim keys)
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# Focus (arrow keys)
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Move windows (vim keys)
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# Move windows (arrow keys)
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d

# Move current workspace to another monitor
bind = $mod CTRL SHIFT, H, movecurrentworkspacetomonitor, l
bind = $mod CTRL SHIFT, L, movecurrentworkspacetomonitor, r
bind = $mod CTRL SHIFT, K, movecurrentworkspacetomonitor, u
bind = $mod CTRL SHIFT, J, movecurrentworkspacetomonitor, d
bind = $mod CTRL SHIFT, left, movecurrentworkspacetomonitor, l
bind = $mod CTRL SHIFT, right, movecurrentworkspacetomonitor, r
bind = $mod CTRL SHIFT, up, movecurrentworkspacetomonitor, u
bind = $mod CTRL SHIFT, down, movecurrentworkspacetomonitor, d

# Regolith resize mode
bind = $mod, R, submap, resize
submap = resize
binde = , left, resizeactive, -6 0
binde = , right, resizeactive, 6 0
binde = , up, resizeactive, 0 -6
binde = , down, resizeactive, 0 6
binde = SHIFT, left, resizeactive, -24 0
binde = SHIFT, right, resizeactive, 24 0
binde = SHIFT, up, resizeactive, 0 -24
binde = SHIFT, down, resizeactive, 0 24
binde = , H, resizeactive, -6 0
binde = , L, resizeactive, 6 0
binde = , K, resizeactive, 0 -6
binde = , J, resizeactive, 0 6
binde = SHIFT, H, resizeactive, -24 0
binde = SHIFT, L, resizeactive, 24 0
binde = SHIFT, K, resizeactive, 0 -24
binde = SHIFT, J, resizeactive, 0 24
bind = , Return, submap, reset
bind = , Escape, submap, reset
bind = $mod, R, submap, reset
submap = reset

# Workspaces 1-10
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Workspaces 11-19
bind = $mod CTRL, 1, workspace, 11
bind = $mod CTRL, 2, workspace, 12
bind = $mod CTRL, 3, workspace, 13
bind = $mod CTRL, 4, workspace, 14
bind = $mod CTRL, 5, workspace, 15
bind = $mod CTRL, 6, workspace, 16
bind = $mod CTRL, 7, workspace, 17
bind = $mod CTRL, 8, workspace, 18
bind = $mod CTRL, 9, workspace, 19

# Move to workspace 1-10
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Move to workspace 11-19
bind = $mod CTRL SHIFT, 1, movetoworkspace, 11
bind = $mod CTRL SHIFT, 2, movetoworkspace, 12
bind = $mod CTRL SHIFT, 3, movetoworkspace, 13
bind = $mod CTRL SHIFT, 4, movetoworkspace, 14
bind = $mod CTRL SHIFT, 5, movetoworkspace, 15
bind = $mod CTRL SHIFT, 6, movetoworkspace, 16
bind = $mod CTRL SHIFT, 7, movetoworkspace, 17
bind = $mod CTRL SHIFT, 8, movetoworkspace, 18
bind = $mod CTRL SHIFT, 9, movetoworkspace, 19

# Carry focused window to workspace
bind = $mod ALT, 1, movetoworkspace, 1
bind = $mod ALT, 2, movetoworkspace, 2
bind = $mod ALT, 3, movetoworkspace, 3
bind = $mod ALT, 4, movetoworkspace, 4
bind = $mod ALT, 5, movetoworkspace, 5
bind = $mod ALT, 6, movetoworkspace, 6
bind = $mod ALT, 7, movetoworkspace, 7
bind = $mod ALT, 8, movetoworkspace, 8
bind = $mod ALT, 9, movetoworkspace, 9
bind = $mod ALT, 0, movetoworkspace, 10
bind = $mod ALT CTRL, 1, movetoworkspace, 11
bind = $mod ALT CTRL, 2, movetoworkspace, 12
bind = $mod ALT CTRL, 3, movetoworkspace, 13
bind = $mod ALT CTRL, 4, movetoworkspace, 14
bind = $mod ALT CTRL, 5, movetoworkspace, 15
bind = $mod ALT CTRL, 6, movetoworkspace, 16
bind = $mod ALT CTRL, 7, movetoworkspace, 17
bind = $mod ALT CTRL, 8, movetoworkspace, 18
bind = $mod ALT CTRL, 9, movetoworkspace, 19

# Workspace navigation
bind = $mod, Tab, workspace, e+1
bind = $mod SHIFT, Tab, workspace, e-1
bind = $mod ALT, right, workspace, e+1
bind = $mod ALT, left, workspace, e-1
bind = $mod CTRL, Tab, workspace, e+1
bind = $mod CTRL SHIFT, Tab, workspace, e-1
bind = $mod CTRL, L, workspace, e+1
bind = $mod CTRL, H, workspace, e-1

# Scroll through workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Bar
bind = $mod, I, exec, pkill -SIGUSR1 waybar

# Mouse binds
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Screenshot
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim - | wl-copy

# Media / hardware keys
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
binde = , XF86MonBrightnessUp, exec, brightnessctl set +5%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ── Window Rules ────────────────────────────────────────
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, title:^(Open File)$
windowrulev2 = float, title:^(Save As)$
windowrulev2 = float, class:^(org.gnome.Calculator)$
