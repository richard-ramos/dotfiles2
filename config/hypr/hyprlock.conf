background {
    monitor =
    color = rgb(1e1e2e)
    blur_passes = 2
    blur_size = 5
}

input-field {
    monitor =
    size = 250, 40
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    outer_color = rgb(89b4fa)
    inner_color = rgb(313244)
    font_color = rgb(cdd6f4)
    fade_on_empty = true
    placeholder_text = <i>Password...</i>
    halign = center
    valign = center
    position = 0, -50
}

label {
    monitor =
    text = $TIME
    color = rgb(cdd6f4)
    font_size = 64
    font_family = FiraMono Nerd Font
    halign = center
    valign = center
    position = 0, 100
}

label {
    monitor =
    text = Hi, $USER
    color = rgb(cdd6f4)
    font_size = 20
    font_family = FiraMono Nerd Font
    halign = center
    valign = center
    position = 0, 30
}
